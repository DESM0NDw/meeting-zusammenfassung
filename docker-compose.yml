services:
  backend:
    build: ./backend
    container_name: meeting-backend
    restart: unless-stopped
    env_file: .env
    networks:
      - 1panel-network

  frontend:
    build: ./frontend
    container_name: meeting-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
